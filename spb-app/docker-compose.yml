version: '3.8'

services:
  # ┌───────────────────────────────────────┐
  # │ APPLICATION SERVICE                    │
  # └───────────────────────────────────────┘
  app:
    build: .                     # Uses your existing Dockerfile
    ports:
      - "9090:8080"
    environment:
      # Connection string to the 'db' service (container name)
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/spb_db
      SPRING_DATASOURCE_USERNAME: spb_user
      SPRING_DATASOURCE_PASSWORD: spb_user_pwd
      SPRING_JPA_HIBERNATE_DDL_AUTO: update  # Auto-create schema (Dev only!)
    depends_on:
      db:
        condition: service_healthy  # Wait for DB to be ready
    restart: unless-stopped

  # ┌───────────────────────────────────────┐
  # │ POSTGRESQL DATABASE SERVICE            │
  # └───────────────────────────────────────┘
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spb_db                 # Database name
      POSTGRES_USER: spb_user
      POSTGRES_PASSWORD: spb_user_pwd
    ports:
      - "5433:5432"                      # Expose for local dev access
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Persist data across restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spb_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:                         # Named volume persists data on disk
